<!DOCTYPE html>
<html lang="eng">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-list</title>
</head>

<body>
    <div id="sidebar">
        <div id="profilDiv" class="sidebarRow">
            <img src="./img/user-icon.webp" alt="icon of a user" id="profilIcon">
            <h1 id="profilName">Tony MOLINIER</h1>
        </div>
        
        <div id="myProjectsDiv" class="sidebarRow">
            <img src="./img/projects-icon.png" alt="icon of my projects" id="myProjectsIcon">
            <h1 id="myProjectsTitle">My Projects</h1>
            <button type="button" class="sidebarBtn addProjectBtn" id="addProjectBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <title>plus</title>
                    <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
                </svg>
            </button>
        </div>
        <div id="sidebarProjectsContainer">

        </div>
    </div>
    <div id="overlayDiv" class="hidden">
        <div id="modalDiv" data-modalType="none">

        </div>
    </div>

    <div id="content"></div>
</body>

</html>
